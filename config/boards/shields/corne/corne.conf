# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
# CONFIG_ZMK_DISPLAY=y


#Board Name
# CONFIG_ZMK_KEYBOARD_NAME="Corne"

#Deep sleep after 30 minutes
# CONFIG_ZMK_SLEEP = y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT = 3600000

#Bluetooth stronger
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_SLEEP=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_KEYBOARD_NAME="Corne"
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

# PAT9125/PAT9126 I2C trackball (mouse + scroll on lower layer)
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_INPUT_PAT912X=y
CONFIG_I2C=y
CONFIG_INPUT_THREAD_STACK_SIZE=1024

# Battery level + status LED (pin 15): boot, pairing, low battery
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_STATUS_LED=y
CONFIG_ZMK_STATUS_LED_BATTERY_LEVEL=y
CONFIG_ZMK_STATUS_LED_ADVERTISING=y
CONFIG_ZMK_STATUS_LED_CONNECTED=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y